services:
  node:
    build: .
    image: rougechain/node:latest
    container_name: rougechain-node
    restart: unless-stopped
    ports:
      - "${API_PORT:-8900}:8900"
    volumes:
      - chain-data:/data/rougechain
    environment:
      - RUST_LOG=info
      - QV_CORS_ORIGINS=${QV_CORS_ORIGINS:-*}
      - BRIDGE_RELAYER_SECRET=${BRIDGE_RELAYER_SECRET:-}
      - XRGE_BRIDGE_VAULT=${XRGE_BRIDGE_VAULT:-}
      - XRGE_BRIDGE_TOKEN=${XRGE_BRIDGE_TOKEN:-}
    command:
      - "--data-dir"
      - "/data/rougechain"
      - "--host"
      - "0.0.0.0"
      - "--api-port"
      - "8900"
      - "--mine"
      - "--genesis"
      - "/etc/rougechain/genesis.json"
      - "--chain-id"
      - "${CHAIN_ID:-rougechain-mainnet-1}"
      - "--peers"
      - "${QV_PEERS:-}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8900/api/stats"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: rougechain-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      node:
        condition: service_healthy
    profiles:
      - monitoring

volumes:
  chain-data:
    driver: local
  prometheus-data:
    driver: local
